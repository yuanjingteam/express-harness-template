skip_output:
  - meta           # 隐藏 Lefthook 版本/标题信息
  - empty_summary  # 隐藏空摘要

pre-commit:
  parallel: true
  commands:
    lint:
      run: npx eslint src/ test/ --ext .ts
      glob: "*.{ts,tsx}"
    typecheck:
      run: npx tsc --noEmit
      glob: "*.{ts,tsx}"

pre-push:
  commands:
    check:
      run: npm run check
